<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trainingsplan März</title>

<meta name="theme-color" content="#0ea5e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">

<style>
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#0ea5e9;
  --accent2:#22c55e;
  --radius:16px;
  --line:#e2e8f0;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:linear-gradient(180deg,#f8fafc,var(--bg));
  color:var(--text);
}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.header{
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;margin-bottom:14px;
}
.title{font-weight:950;font-size:18px}
.date{font-size:12px;color:var(--muted);font-weight:800}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  border:1px solid rgba(15,23,42,.06);
}
.metaRow{
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  margin-bottom:12px;
}
.chip{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(2,6,23,.04);
  color:var(--muted);
  font-weight:900;
}
.progressRow{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:14px;
}
.progress{
  height:10px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
  flex:1;
}
.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:.25s;
}
.pct{
  width:56px;
  text-align:right;
  font-size:12px;
  color:var(--muted);
  font-weight:900;
}
.exercise{
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}
.exerciseTop{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
}
.exercise h2{
  margin:0;
  font-size:18px;
  font-weight:950;
}
.exercise p{
  margin:6px 0 0;
  font-size:13px;
  color:var(--muted);
}
.videoLink{
  text-decoration:none;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid var(--line);
  font-weight:900;
  background:#fff;
}
.checkRow{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;flex-wrap:wrap;
}
.checkRow label{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:900;font-size:13px;
}
.checkRow input{width:18px;height:18px;accent-color:var(--accent2)}
.timer{
  display:flex;justify-content:space-between;align-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}
.timer span{font-size:26px;font-weight:1000}
button{
  font:inherit;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:900;
}
button.primary{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;border:none;
}
.navRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
}
.count{font-size:12px;color:var(--muted);font-weight:900;text-align:center}
.list button{
  width:100%;
  text-align:left;
  margin-top:8px;
}
.active{background:rgba(14,165,233,.08)}
.rest{
  border:1px dashed rgba(15,23,42,.20);
  border-radius:14px;
  padding:14px;
  background:rgba(2,6,23,.02);
}
.footer{
  margin-top:12px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <div>
    <div class="title">Trainingsplan März</div>
    <div class="date" id="dateText"></div>
  </div>
  <div>
    <button id="prevDay">◀</button>
    <button id="nextDay">▶</button>
  </div>
</div>

<div class="card">
  <div class="metaRow">
    <div class="chip" id="dayChip"></div>
    <div class="chip" id="weekChip"></div>
    <div class="chip" id="statusChip"></div>
  </div>

  <div class="progressRow">
    <div class="progress"><div id="bar"></div></div>
    <div class="pct" id="pctText">0%</div>
  </div>

  <div id="main"></div>

  <div class="footer">
    Fortschritt wird lokal gespeichert.
  </div>
</div>
</div>

<script>
const EXERCISES={
  Kniebeugen:{name:"Kniebeugen",hint:"Füsse schulterbreit, Rücken stabil.",video:"https://www.youtube.com/results?search_query=Kniebeugen+richtige+Ausführung"},
  Liegestuetze:{name:"Liegestütze",hint:"Körper gerade halten.",video:"https://www.youtube.com/results?search_query=Liegestütze+richtige+Ausführung"},
  Plank:{name:"Plank (Unterarmstütz)",hint:"Bauch fest anspannen.",video:"https://www.youtube.com/results?search_query=Plank+Unterarmstütz+Technik"},
  Ausfallschritte:{name:"Ausfallschritte",hint:"Oberkörper aufrecht.",video:"https://www.youtube.com/results?search_query=Ausfallschritte+richtige+Ausführung"},
  MountainClimbers:{name:"Mountain Climbers",hint:"Hüfte ruhig halten.",video:"https://www.youtube.com/results?search_query=Mountain+Climbers+Technik"},
  BicycleCrunch:{name:"Bicycle Crunch",hint:"Langsam und kontrolliert.",video:"https://www.youtube.com/results?search_query=Bicycle+Crunch+Technik"},
  Seitstuetz:{name:"Seitstütz",hint:"Hüfte hochziehen.",video:"https://www.youtube.com/results?search_query=Seitstütz+Technik"},
  Burpees:{name:"Burpees",hint:"Saubere Ausführung vor Tempo.",video:"https://www.youtube.com/results?search_query=Burpees+richtige+Ausführung"}
};

const DAY_PATTERNS={
A:["Kniebeugen","Liegestuetze","Plank","Ausfallschritte","Seitstuetz"],
B:["MountainClimbers","BicycleCrunch","Plank","Kniebeugen"],
C:["Burpees","Seitstuetz","BicycleCrunch","Ausfallschritte"],
Pause:[]
};

const ROTATION=["A","B","C","Pause","A","B","Pause"];

let state={
date:new Date(),
index:0,
progress:JSON.parse(localStorage.getItem("progress")||"{}"),
timer:null,
seconds:30
};

function getWeekSeconds(day){
if(day<=7)return 30;
if(day<=14)return 40;
if(day<=21)return 20;
return 45;
}

function render(){
const day=state.date.getDate();
const pattern=ROTATION[(day-1)%ROTATION.length];

document.getElementById("dateText").textContent=state.date.toLocaleDateString("de-CH");
document.getElementById("dayChip").textContent="Tag "+pattern;
document.getElementById("weekChip").textContent=getWeekSeconds(day)+" Sek";

const dayKey=state.date.toDateString();
state.progress[dayKey]=state.progress[dayKey]||{};

if(pattern==="Pause"){
document.getElementById("main").innerHTML='<div class="rest"><strong>Erholung</strong><p>10 Minuten Spaziergang oder Dehnen.</p></div>';
return;
}

const list=DAY_PATTERNS[pattern];
const ex=list[state.index];
const exData=EXERCISES[ex];

state.seconds=getWeekSeconds(day);

let doneCount=Object.values(state.progress[dayKey]).filter(Boolean).length;
let pct=Math.round((doneCount/list.length)*100);

document.getElementById("bar").style.width=pct+"%";
document.getElementById("pctText").textContent=pct+"%";

document.getElementById("main").innerHTML=`
<div class="exercise">
<div class="exerciseTop">
<div>
<h2>${exData.name}</h2>
<p>${exData.hint}</p>
</div>
<a class="videoLink" href="${exData.video}" target="_blank">▶ Video</a>
</div>
<div class="checkRow">
<label><input type="checkbox" id="doneBox" ${state.progress[dayKey][ex]?"checked":""}> erledigt</label>
<div>${state.index+1}/${list.length}</div>
</div>
</div>
<div class="timer">
<span id="timerDisplay">${state.seconds}s</span>
<div>
<button class="primary" id="startBtn">Start</button>
<button id="resetBtn">Reset</button>
</div>
</div>
<div class="navRow">
<button id="prevBtn">Zurück</button>
<div class="count">${state.index+1}/${list.length}</div>
<button id="nextBtn">Nächste</button>
</div>
<div id="list"></div>
`;

document.getElementById("doneBox").onchange=function(){
state.progress[dayKey][ex]=this.checked;
localStorage.setItem("progress",JSON.stringify(state.progress));
render();
};

document.getElementById("prevBtn").onclick=()=>{if(state.index>0){state.index--;render()}};
document.getElementById("nextBtn").onclick=()=>{if(state.index<list.length-1){state.index++;render()}};

document.getElementById("startBtn").onclick=function(){
clearInterval(state.timer);
state.timer=setInterval(()=>{
state.seconds--;
document.getElementById("timerDisplay").textContent=state.seconds+"s";
if(state.seconds<=0)clearInterval(state.timer);
},1000);
};

document.getElementById("resetBtn").onclick=function(){
clearInterval(state.timer);
render();
};

const listDiv=document.getElementById("list");
listDiv.innerHTML="";
list.forEach((id,i)=>{
const btn=document.createElement("button");
btn.textContent=EXERCISES[id].name+(state.progress[dayKey][id]?" ✓":"");
if(i===state.index)btn.classList.add("active");
btn.onclick=()=>{state.index=i;render()};
listDiv.appendChild(btn);
});
}

document.getElementById("prevDay").onclick=()=>{state.date.setDate(state.date.getDate()-1);state.index=0;render()};
document.getElementById("nextDay").onclick=()=>{state.date.setDate(state.date.getDate()+1);state.index=0;render()};

render();

if("serviceWorker"in navigator){
navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
