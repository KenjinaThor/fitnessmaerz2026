<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trainingsplan März</title>

<meta name="theme-color" content="#0ea5e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">

<style>
:root{
  --bg:#f2f3f7;
  --card:rgba(255,255,255,.92);
  --text:#0f172a;
  --muted:#667085;
  --line:rgba(15,23,42,.10);
  --shadow:0 18px 45px rgba(2,6,23,.12);
  --radius:22px;
  --radius2:18px;
  --accent:#0ea5e9;
  --accent2:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1100px 700px at 10% 5%, rgba(14,165,233,.16), transparent 60%),
    radial-gradient(900px 700px at 90% 10%, rgba(34,197,94,.14), transparent 60%),
    linear-gradient(180deg,#fbfcff,var(--bg));
  padding-top:calc(14px + env(safe-area-inset-top));
  padding-bottom:calc(18px + env(safe-area-inset-bottom));
}
.app{
  max-width:560px;
  margin:0 auto;
  padding:0 16px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.brand{
  display:flex;
  gap:12px;
  align-items:center;
}
.logo{
  width:42px;height:42px;
  border-radius:16px;
  display:grid;place-items:center;
  background:linear-gradient(135deg, rgba(14,165,233,.18), rgba(34,197,94,.14));
  border:1px solid rgba(15,23,42,.08);
}
.brandTitle{font-weight:950;font-size:16px}
.brandSub{font-size:12px;color:var(--muted);font-weight:700}
.iconBtn{
  width:42px;height:42px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:900;
}
.hero{
  margin-bottom:12px;
  padding:14px;
  border-radius:20px;
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
}
.heroDate{font-weight:950;font-size:15px}
.pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  font-size:12px;
  font-weight:850;
  margin-top:6px;
}
.progressRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
.bar{
  flex:1;height:10px;
  background:rgba(15,23,42,.08);
  border-radius:999px;
  overflow:hidden;
}
.barFill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.pct{font-size:12px;font-weight:900;color:var(--muted)}
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  padding:14px;
}
.exerciseCard{
  border-radius:var(--radius2);
  border:1px solid var(--line);
  padding:14px;
  background:#fff;
}
.exName{font-weight:1000;font-size:18px}
.exHint{margin-top:6px;font-size:13px;color:var(--muted)}
.videoBtn{
  display:inline-block;
  margin-top:8px;
  padding:8px 12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:900;
  text-decoration:none;
  color:var(--text);
}
.checkRow{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.checkRow label{font-weight:900;font-size:13px}
.timer{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:var(--radius2);
  border:1px solid var(--line);
  background:#fff;
}
.timer span{font-size:26px;font-weight:1000}
.btn{
  height:40px;
  padding:0 12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:900;
}
.btnPrimary{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
}
.navEx{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
}
.footer{
  margin-top:12px;
  text-align:center;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="app">

<div class="topbar">
  <div class="brand">
    <div class="logo">💪</div>
    <div>
      <div class="brandTitle">Trainingsplan März</div>
      <div class="brandSub">10–15 Minuten · Eigengewicht</div>
    </div>
  </div>
  <div>
    <button class="iconBtn" id="prevDay">◀</button>
    <button class="iconBtn" id="nextDay">▶</button>
  </div>
</div>

<div class="hero">
  <div class="heroDate" id="dateText"></div>
  <div>
    <span class="pill" id="dayChip"></span>
    <span class="pill" id="weekChip"></span>
    <span class="pill" id="statusChip"></span>
  </div>
  <div class="progressRow">
    <div class="bar"><div class="barFill" id="barFill"></div></div>
    <div class="pct" id="pctText">0%</div>
  </div>
</div>

<div class="card" id="content"></div>

<div class="footer">Ein kleiner Schritt zählt.</div>

</div>

<script>
const EXERCISES={
  Kniebeugen:{name:"Kniebeugen",hint:"Füsse schulterbreit, Rücken stabil.",video:"https://www.youtube.com/results?search_query=Kniebeugen+richtige+Ausführung"},
  Liegestuetze:{name:"Liegestütze",hint:"Körper in Linie halten.",video:"https://www.youtube.com/results?search_query=Liegestütze+richtige+Ausführung"},
  Plank:{name:"Plank",hint:"Bauch fest, nicht durchhängen.",video:"https://www.youtube.com/results?search_query=Plank+Technik"},
  Ausfallschritte:{name:"Ausfallschritte",hint:"Oberkörper aufrecht.",video:"https://www.youtube.com/results?search_query=Ausfallschritte+Technik"},
  MountainClimbers:{name:"Mountain Climbers",hint:"Hüfte ruhig halten.",video:"https://www.youtube.com/results?search_query=Mountain+Climbers+Technik"},
  BicycleCrunch:{name:"Bicycle Crunch",hint:"Langsam und kontrolliert.",video:"https://www.youtube.com/results?search_query=Bicycle+Crunch+Technik"},
  Seitstuetz:{name:"Seitstütz",hint:"Hüfte hochziehen.",video:"https://www.youtube.com/results?search_query=Seitstütz+Technik"},
  Burpees:{name:"Burpees",hint:"Saubere Ausführung.",video:"https://www.youtube.com/results?search_query=Burpees+Technik"}
};

const DAY_PATTERNS={
  A:["Kniebeugen","Liegestuetze","Plank","Ausfallschritte","Seitstuetz"],
  B:["MountainClimbers","BicycleCrunch","Plank","Kniebeugen"],
  C:["Burpees","Seitstuetz","BicycleCrunch","Ausfallschritte"],
  Pause:[]
};

const ROTATION=["A","B","C","Pause","A","B","Pause"];
const STORAGE_KEY="trainingsplan_ios";

let state={date:new Date(),index:0,progress:JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")};

function formatDate(d){
  return d.getDate()+". "+d.toLocaleString("de-CH",{month:"long"})+" "+d.getFullYear();
}
function dayKey(d){return d.toDateString();}
function getWeekSeconds(day){
  if(day<=7)return 30;
  if(day<=14)return 40;
  if(day<=21)return 20;
  return 45;
}

function render(){
  const day=state.date.getDate();
  const pattern=ROTATION[(day-1)%ROTATION.length];
  const key=dayKey(state.date);
  if(!state.progress[key])state.progress[key]={};

  document.getElementById("dateText").textContent=formatDate(state.date);
  document.getElementById("dayChip").textContent="Tag "+pattern;
  document.getElementById("weekChip").textContent=getWeekSeconds(day)+" Sek";

  if(pattern==="Pause"){
    document.getElementById("content").innerHTML="<div>Erholungstag – 10 Minuten Spaziergang.</div>";
    return;
  }

  const list=DAY_PATTERNS[pattern];
  const ex=list[state.index];
  const exData=EXERCISES[ex];

  const doneCount=Object.values(state.progress[key]).filter(Boolean).length;
  const pct=Math.round((doneCount/list.length)*100);

  document.getElementById("barFill").style.width=pct+"%";
  document.getElementById("pctText").textContent=pct+"%";
  document.getElementById("statusChip").textContent=pct===100?"geschafft":"offen";

  document.getElementById("content").innerHTML=`
    <div class="exerciseCard">
      <div class="exName">${exData.name}</div>
      <div class="exHint">${exData.hint}</div>
      <a class="videoBtn" href="${exData.video}" target="_blank">▶ Video</a>
      <div class="checkRow">
        <label><input type="checkbox" id="doneBox" ${state.progress[key][ex]?"checked":""}> erledigt</label>
        <div>${state.index+1}/${list.length}</div>
      </div>
    </div>
  `;

  document.getElementById("doneBox").onchange=function(){
    state.progress[key][ex]=this.checked;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state.progress));
    render();
  };
}

document.getElementById("prevDay").onclick=()=>{state.date.setDate(state.date.getDate()-1);state.index=0;render();};
document.getElementById("nextDay").onclick=()=>{state.date.setDate(state.date.getDate()+1);state.index=0;render();};

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
