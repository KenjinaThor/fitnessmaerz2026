<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trainingsplan März</title>

<meta name="theme-color" content="#0ea5e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">

<style>
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#0ea5e9;
  --accent2:#22c55e;
  --radius:16px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:linear-gradient(180deg,#f8fafc,var(--bg));
  color:var(--text);
}
.wrap{max-width:520px;margin:0 auto;padding:16px}
.header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.title{font-weight:900;font-size:18px}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;color:var(--muted)}
.progress{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:14px}
.progress div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
.exercise h2{margin:0;font-size:18px}
.exercise p{margin:6px 0 10px;font-size:13px;color:var(--muted)}
button{
  font:inherit;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  background:#fff;
  cursor:pointer;
  font-weight:800;
}
button.primary{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
}
.timer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
}
.timer span{
  font-size:26px;
  font-weight:900;
}
.nav{display:flex;justify-content:space-between;margin-top:10px}
.list button{
  width:100%;
  text-align:left;
  margin-bottom:6px;
}
.active{background:rgba(14,165,233,.1)}
</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <div class="title">Trainingsplan März 💪</div>
  <div id="dateText"></div>
</div>

<div class="card">
  <div class="row">
    <div id="dayInfo"></div>
    <div id="weekInfo"></div>
  </div>

  <div class="progress"><div id="bar"></div></div>

  <div class="exercise">
    <h2 id="exerciseName"></h2>
    <p id="exerciseHint"></p>
    <label>
      <input type="checkbox" id="doneBox"> erledigt
    </label>
  </div>

  <div class="timer">
    <span id="timerDisplay"></span>
    <div>
      <button class="primary" id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn">Zurück</button>
    <button id="nextBtn">Nächste</button>
  </div>

  <div class="list" id="list"></div>

</div>
</div>

<script>
const EXERCISES={
  Kniebeugen:{name:"Kniebeugen",hint:"Füsse schulterbreit, Rücken stabil."},
  Liegestuetze:{name:"Liegestütze",hint:"Körper gerade halten."},
  Plank:{name:"Plank (Unterarmstütz)",hint:"Bauch fest anspannen."},
  Ausfallschritte:{name:"Ausfallschritte",hint:"Oberkörper aufrecht."},
  MountainClimbers:{name:"Mountain Climbers",hint:"Hüfte ruhig halten."},
  BicycleCrunch:{name:"Bicycle Crunch",hint:"Langsam und kontrolliert."},
  Seitstuetz:{name:"Seitstütz",hint:"Hüfte hochziehen."},
  Burpees:{name:"Burpees",hint:"Saubere Ausführung vor Tempo."}
};

const DAY_PATTERNS={
A:["Kniebeugen","Liegestuetze","Plank","Ausfallschritte","Seitstuetz"],
B:["MountainClimbers","BicycleCrunch","Plank","Kniebeugen"],
C:["Burpees","Seitstuetz","BicycleCrunch","Ausfallschritte"],
Pause:[]
};

const ROTATION=["A","B","C","Pause","A","B","Pause"];

let state={
  date:new Date(),
  index:0,
  progress:JSON.parse(localStorage.getItem("progress")||"{}"),
  timer:null,
  seconds:30
};

function getWeekSeconds(day){
  if(day<=7)return 30;
  if(day<=14)return 40;
  if(day<=21)return 20;
  return 45;
}

function render(){
  const day=state.date.getDate();
  const pattern=ROTATION[(day-1)%ROTATION.length];

  document.getElementById("dateText").textContent=
    state.date.toLocaleDateString("de-CH");

  document.getElementById("dayInfo").textContent="Tag "+pattern;
  document.getElementById("weekInfo").textContent=getWeekSeconds(day)+" Sek";

  if(pattern==="Pause"){
    document.getElementById("exerciseName").textContent="Erholung";
    document.getElementById("exerciseHint").textContent="10 Minuten Spazieren oder Dehnen.";
    return;
  }

  const list=DAY_PATTERNS[pattern];
  const ex=list[state.index];
  const exData=EXERCISES[ex];

  document.getElementById("exerciseName").textContent=exData.name;
  document.getElementById("exerciseHint").textContent=exData.hint;

  state.seconds=getWeekSeconds(day);
  document.getElementById("timerDisplay").textContent=state.seconds+"s";

  const dayKey=state.date.toDateString();
  state.progress[dayKey]=state.progress[dayKey]||{};
  document.getElementById("doneBox").checked=state.progress[dayKey][ex]||false;

  const doneCount=Object.values(state.progress[dayKey]).filter(Boolean).length;
  const pct=Math.round((doneCount/list.length)*100);
  document.getElementById("bar").style.width=pct+"%";

  const listDiv=document.getElementById("list");
  listDiv.innerHTML="";
  list.forEach((id,i)=>{
    const btn=document.createElement("button");
    btn.textContent=EXERCISES[id].name+(state.progress[dayKey][id]?" ✓":"");
    if(i===state.index)btn.classList.add("active");
    btn.onclick=()=>{state.index=i;render()};
    listDiv.appendChild(btn);
  });
}

document.getElementById("doneBox").onchange=function(){
  const dayKey=state.date.toDateString();
  const pattern=ROTATION[(state.date.getDate()-1)%ROTATION.length];
  const ex=DAY_PATTERNS[pattern][state.index];
  state.progress[dayKey][ex]=this.checked;
  localStorage.setItem("progress",JSON.stringify(state.progress));
  render();
};

document.getElementById("prevBtn").onclick=()=>{
  if(state.index>0){state.index--;render()}
};

document.getElementById("nextBtn").onclick=()=>{
  state.index++;render()
};

document.getElementById("startBtn").onclick=function(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.seconds--;
    document.getElementById("timerDisplay").textContent=state.seconds+"s";
    if(state.seconds<=0)clearInterval(state.timer);
  },1000);
};

document.getElementById("resetBtn").onclick=function(){
  clearInterval(state.timer);
  render();
};

render();

if("serviceWorker"in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
