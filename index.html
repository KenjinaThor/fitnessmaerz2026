<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trainingsplan März</title>

<meta name="theme-color" content="#0ea5e9">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">

<style>
:root{
  --text:#0f172a;
  --muted:#667085;
  --line:rgba(15,23,42,.10);
  --accent:#0ea5e9;
  --accent2:#22c55e;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,Segoe UI,Roboto;
  background:#f4f6fb;
  color:var(--text);
  padding:20px;
}

.container{
  max-width:600px;
  margin:0 auto;
}

h1{
  margin-bottom:6px;
}

.date{
  color:var(--muted);
  font-size:14px;
  margin-bottom:16px;
}

.progress{
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .3s ease;
}

.task{
  background:#fff;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  border:1px solid var(--line);
}

.task-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.task-name{
  font-weight:700;
  font-size:16px;
}

.video-btn{
  text-decoration:none;
  font-size:13px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  font-weight:600;
}

.checkbox{
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:600;
}

.controls{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:600;
}
</style>
</head>

<body>
<div class="container">

<h1>Trainingsplan März</h1>
<div class="date" id="dateText"></div>

<div class="progress"><div id="progressBar"></div></div>

<div id="tasks"></div>

<div class="controls">
  <button onclick="changeDay(-1)">◀ Vorheriger Tag</button>
  <button onclick="changeDay(1)">Nächster Tag ▶</button>
</div>

</div>

<script>
const EXERCISES={
  Kniebeugen:{name:"Kniebeugen",video:"https://www.youtube.com/results?search_query=Kniebeugen+richtige+Ausführung"},
  Liegestuetze:{name:"Liegestütze",video:"https://www.youtube.com/results?search_query=Liegestütze+richtige+Ausführung"},
  Plank:{name:"Plank",video:"https://www.youtube.com/results?search_query=Plank+Technik"},
  Ausfallschritte:{name:"Ausfallschritte",video:"https://www.youtube.com/results?search_query=Ausfallschritte+Technik"},
  MountainClimbers:{name:"Mountain Climbers",video:"https://www.youtube.com/results?search_query=Mountain+Climbers+Technik"},
  BicycleCrunch:{name:"Bicycle Crunch",video:"https://www.youtube.com/results?search_query=Bicycle+Crunch+Technik"},
  Seitstuetz:{name:"Seitstütz",video:"https://www.youtube.com/results?search_query=Seitstütz+Technik"},
  Burpees:{name:"Burpees",video:"https://www.youtube.com/results?search_query=Burpees+Technik"}
};

const DAY_PATTERNS={
  A:["Kniebeugen","Liegestuetze","Plank","Ausfallschritte"],
  B:["MountainClimbers","BicycleCrunch","Plank","Kniebeugen"],
  C:["Burpees","Seitstuetz","BicycleCrunch","Ausfallschritte"],
  Pause:[]
};

const ROTATION=["A","B","C","Pause","A","B","Pause"];
const STORAGE_KEY="trainingsplan_list_v2";

let state={
  date:new Date(),
  progress:JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")
};

function formatDate(d){
  return d.getDate()+". "+d.toLocaleString("de-CH",{month:"long"})+" "+d.getFullYear();
}

function dayKey(d){
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function changeDay(offset){
  state.date.setDate(state.date.getDate()+offset);
  render();
}

function render(){
  const day=state.date.getDate();
  const pattern=ROTATION[(day-1)%ROTATION.length];
  const key=dayKey(state.date);

  document.getElementById("dateText").textContent=formatDate(state.date);

  const container=document.getElementById("tasks");
  container.innerHTML="";

  if(pattern==="Pause"){
    container.innerHTML="<div class='task'>Erholungstag – 10 Minuten Bewegung.</div>";
    document.getElementById("progressBar").style.width="0%";
    return;
  }

  if(!state.progress[key]) state.progress[key]={};

  const list=DAY_PATTERNS[pattern];

  let doneCount=0;

  list.forEach((id)=>{
    if(state.progress[key][id]) doneCount++;

    const ex=EXERCISES[id];

    const task=document.createElement("div");
    task.className="task";

    task.innerHTML=`
      <div class="task-top">
        <div class="task-name">${ex.name}</div>
        <a class="video-btn" href="${ex.video}" target="_blank">Video</a>
      </div>
      <div class="checkbox">
        <input type="checkbox" ${state.progress[key][id]?"checked":""}>
        erledigt
      </div>
    `;

    task.querySelector("input").addEventListener("change",(e)=>{
      state.progress[key][id]=e.target.checked;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state.progress));
      render();
    });

    container.appendChild(task);
  });

  const percent=Math.round((doneCount/list.length)*100);
  document.getElementById("progressBar").style.width=percent+"%";
}

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
